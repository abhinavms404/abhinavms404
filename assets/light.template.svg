    <text x="295" y="25" text-anchor="middle" fill="rgba(0,0,0,0.25)" font-family="'Courier New','Consolas','Liberation Mono','DejaVu Sans Mono','Ubuntu Mono',monospace" font-size="10">/bin/zsh — terminal</text>

