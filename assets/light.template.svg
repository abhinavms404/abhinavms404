    <rect x="0" y="18" width="530" height="18" fill="rgba(0,0,0,0.03)"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="56" cy="18" r="5" fill="#28c840"/>
    <text x="265" y="23" text-anchor="middle" fill="rgba(0,0,0,0.3)" font-family="'Courier New','Consolas','Liberation Mono','DejaVu Sans Mono','Ubuntu Mono',monospace" font-size="11">root@abhinavms:~/profile</text>

    <!-- ASCII Portrait from user file -->
    <g transform="translate(15, 40)">
      <rect x="15" y="0" width="500" height="495" rx="10" fill="none" stroke="rgba(5,150,105,0.08)" stroke-width="1"/>

      <text font-family="'Courier New','Consolas','Liberation Mono','DejaVu Sans Mono','Ubuntu Mono',monospace" font-size="6.5" fill="#059669" opacity="0.9" xml:space="preserve">
{{ASCII_ART}}
